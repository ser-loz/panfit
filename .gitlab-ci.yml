# Publishes the app to GitLab Pages on every push to the default branch.
# No build step: the site is the repository's static files.
pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r index.html style.css app.js sw.js manifest.webmanifest icons public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
